clients:
  - 1_xtls_reality:
      protocol: "vless"
      id: "{{XRAY_UUID}}"
      address: "{{PUBLIC_IP}}"
      port: 443
      params:
        security: "reality"
        # Profile 1 targets the VISION+REALITY inbound (XTLS flow + fallbacks),
        # which keeps "decryption":"none", so this stays "none" too.
        encryption: "none"
        pbk: "{{XRAY_REALITY_PUBLIC_KEY}}"
        headerType: "none"
        fp: "chrome"
        spx: "/"
        type: "tcp"
        flow: "xtls-rprx-vision"
        sni: "{{REALITY_DOMAIN}}"
        sid: "{{XRAY_REALITY_SHORT_ID}}"
  - 2_xhttp_reality:
      protocol: "vless"
      id: "{{XRAY_UUID}}"
      address: "{{PUBLIC_IP}}"
      port: 443
      params:
        mode: "auto"
        path: "{{XRAY_XHTTP_PATH}}"
        security: "reality"
        encryption: "{{XRAY_VLESS_ENCRYPTION}}"
        pbk: "{{XRAY_REALITY_PUBLIC_KEY}}"
        fp: "chrome"
        spx: "/"
        type: "xhttp"
        sni: "{{REALITY_DOMAIN}}"
        sid: "{{XRAY_REALITY_SHORT_ID}}"
  - 3_xhttp_cdn_xhttp_reality:
      protocol: "vless"
      id: "{{XRAY_UUID}}"
      address: "{{XHTTP_DOMAIN}}"
      port: 443
      params:
        mode: "auto"
        path: "{{XRAY_XHTTP_PATH}}"
        security: "tls"
        alpn: "h2"
        encryption: "{{XRAY_VLESS_ENCRYPTION}}"
        extra:
          downloadSettings:
            address: "{{PUBLIC_IP}}"
            port: 443
            network: "xhttp"
            security: "reality"
            realitySettings:
              show: false
              serverName: "{{REALITY_DOMAIN}}"
              fingerprint: "chrome"
              publicKey: "{{XRAY_REALITY_PUBLIC_KEY}}"
              shortId: "{{XRAY_REALITY_SHORT_ID}}"
              spiderX: "/"
            xhttpSettings:
              host: ""
              path: "{{XRAY_XHTTP_PATH}}"
              mode: "auto"
        host: "{{XHTTP_DOMAIN}}"
        fp: "chrome"
        type: "xhttp"
        sni: "{{XHTTP_DOMAIN}}"
  - 4_xhttp_cdn:
      protocol: "vless"
      id: "{{XRAY_UUID}}"
      address: "{{XHTTP_DOMAIN}}"
      port: 443
      params:
        mode: "auto"
        path: "{{XRAY_XHTTP_PATH}}"
        security: "tls"
        alpn: "h2"
        encryption: "{{XRAY_VLESS_ENCRYPTION}}"
        host: "{{XHTTP_DOMAIN}}"
        fp: "chrome"
        type: "xhttp"
        sni: "{{XHTTP_DOMAIN}}"
  - 5_xhttp_reality_xhttp_cdn:
      protocol: "vless"
      id: "{{XRAY_UUID}}"
      address: "{{PUBLIC_IP}}"
      port: 443
      params:
        mode: "auto"
        path: "{{XRAY_XHTTP_PATH}}"
        security: "reality"
        encryption: "{{XRAY_VLESS_ENCRYPTION}}"
        extra:
          downloadSettings:
            address: "{{XHTTP_DOMAIN}}"
            port: 443
            network: "xhttp"
            security: "tls"
            tlsSettings:
              serverName: "{{XHTTP_DOMAIN}}"
              alpn: "h2"
              fingerprint: "chrome"
            xhttpSettings:
              host: "{{XHTTP_DOMAIN}}"
              path: "{{XRAY_XHTTP_PATH}}"
              mode: "auto"
        pbk: "{{XRAY_REALITY_PUBLIC_KEY}}"
        fp: "chrome"
        spx: "/"
        type: "xhttp"
        sni: "{{REALITY_DOMAIN}}"
        sid: "{{XRAY_REALITY_SHORT_ID}}"
  - 6_xhttp:
      protocol: "vless"
      id: "{{XRAY_UUID}}"
      address: "{{PUBLIC_IP}}"
      port: 443
      params:
        mode: "auto"
        path: "{{XRAY_XHTTP_PATH}}"
        security: "tls"
        alpn: "h2"
        encryption: "{{XRAY_VLESS_ENCRYPTION}}"
        host: "{{XHTTP_DOMAIN}}"
        fp: "chrome"
        type: "xhttp"
        sni: "{{XHTTP_DOMAIN}}"
        # Pin the server's leaf cert (pcs = pinnedPeerCertSha256) instead of the
        # removed allowInsecure. Lets the client use any SNI while keeping the
        # connection verified. Auto-filled by the xray-config service.
        pcs: "{{XRAY_XHTTP_PINNED_CERT_SHA256}}"
  - 7_xhttp_self:
      protocol: "vless"
      id: "{{XRAY_UUID}}"
      address: "{{PUBLIC_IP}}"
      port: 443
      params:
        mode: "auto"
        path: "{{XRAY_XHTTP_PATH}}"
        security: "tls"
        alpn: "h2"
        encryption: "{{XRAY_VLESS_ENCRYPTION}}"
        # nginx serves the pinned long-lived self-signed REALITY_DOMAIN leaf
        # from its catch-all default_server for any SNI other than REALITY_DOMAIN /
        # XHTTP_DOMAIN, so this is freely changeable (e.g. to a "clean" domain to
        # dodge SNI blocking). Keep it off the two real domains.
        host: "{{REALITY_DOMAIN}}"
        fp: "chrome"
        type: "xhttp"
        sni: "{{REALITY_DOMAIN}}"
        # Pin the self-signed leaf cert nginx's default_server serves.
        # Auto-filled by the xray-config service from the openssl-cert output.
        pcs: "{{XRAY_XHTTP_SELF_PINNED_CERT_SHA256}}"
  - 8_xhttp_cdn_ech:
      protocol: "vless"
      id: "{{XRAY_UUID}}"
      address: "{{XHTTP_DOMAIN}}"
      port: 443
      params:
        mode: "auto"
        path: "{{XRAY_XHTTP_PATH}}"
        security: "tls"
        alpn: "h2"
        encryption: "{{XRAY_VLESS_ENCRYPTION}}"
        host: "{{XHTTP_DOMAIN}}"
        fp: "chrome"
        type: "xhttp"
        sni: "{{XHTTP_DOMAIN}}"
        # Encrypted Client Hello. Share-link standard param "ech" maps to the
        # echConfigList config field. This DoH form fetches the ECHConfig from
        # DNS at runtime and queries the sni's HTTPS record (1.1.1.1 over DoH).
        # No cert pin: the CDN terminates TLS with a normal CA-trusted cert.
        ech: "https://1.1.1.1/dns-query"
